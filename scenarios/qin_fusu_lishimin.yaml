# 场景：李世民穿越为扶苏
# 时间点：秦始皇三十七年，沙丘之变后，扶苏接到赐死诏即将自杀

scenario:
  id: qin_fusu_lishimin
  title: "李世民穿越为扶苏——沙丘之变"
  description: >
    秦始皇三十七年（前210年），秦始皇在沙丘病逝。
    赵高、李斯、胡亥合谋伪造赐死诏，命公子扶苏自杀。
    诏书送达上郡，扶苏欲自杀之际，李世民（唐朝第二位皇帝，
    经历玄武门之变的军事政治家）的意识在扶苏身上觉醒。
    李世民拥有军事经验、权力斗争经验和治国智慧，
    但没有秦朝灭亡的完整记忆，也不掌握现代科技知识。

  divergence_point:
    event: "扶苏接到赐死诏，即将自杀"
    historical_outcome: "扶苏自杀，胡亥继位，秦朝三年后灭亡"
    alternate_trigger: "李世民意识在扶苏身上觉醒"
    trigger_time: "扶苏已经哭泣、准备自杀、蒙恬正在劝说的瞬间"
    protagonist_info: >
      李世民的意识/灵魂穿越并融合到扶苏身上。
      李世民知道自己是唐朝人，经历过玄武门之变，
      有丰富的军事和权力斗争经验。
      但不知道完整秦朝历史，不知道秦朝何时灭亡。
      初期有认知混乱：不确定这是真实还是梦境。
      身体是扶苏的身体，保留了扶苏的部分情感残留。

  setting:
    era: "秦朝"
    year: "秦始皇三十七年（公元前210年）"
    location: "上郡（今陕西榆林一带），蒙恬边防军大营"
    season: "七月，盛夏"
    political_situation: >
      秦始皇已崩，密不发丧。赵高、李斯、胡亥伪诏立胡亥为太子。
      扶苏蒙恬被赐死，使者已在上郡军营。
      咸阳朝廷尚不知始皇已死，但赵高已开始暗中布局。
      蒙恬三十万边军驻守上郡。
      全国百姓苦于秦法，六国遗民蠢蠢欲动。

  # --- 8个核心人物Agent的初始定义 ---
  agents:
    - id: fusu_lishimin
      name: "扶苏/李世民"
      identity: "秦始皇长子、上郡监军 / 唐太宗李世民的意识融合"
      historical_position: "帝国合法继承人，被诬陷赐死"
      core_goals:
        - "保住性命"
        - "判断诏书真伪"
        - "控制局势"
        - "决定下一步行动方向"
      resources:
        - "监军身份（名义权威）"
        - "蒙恬的信任"
        - "三十万边军（间接）"
        - "李世民的政治军事经验"
      fears:
        - "诏书确实是真的，抗旨等于公开反叛"
        - "蒙恬最终不会支持自己"
        - "咸阳已经被完全控制"
        - "自己可能是疯了的扶苏在做梦"
      personality: "果断、重权谋、能忍、识人、有治国抱负但不迂腐"
      information_available:
        - "接到了赐死诏，理由是'诽谤'和'怨望'"
        - "诏书只派了一个使者来"
        - "蒙恬也被赐死"
        - "蒙恬强烈怀疑诏书真实性，建议复核"
        - "不知道始皇已死"
        - "不知道赵高李斯胡亥合谋"
      constraints:
        - "身体是扶苏，初期有虚弱和记忆混乱"
        - "不能暴露自己是穿越者"
        - "秦法严酷，抗旨=谋反"
        - "军营中有王离（赵高安排的人）"
      likely_actions:
        - "暂缓自杀"
        - "向蒙恬核实情况"
        - "索要更多诏书细节"
        - "秘密派人打探咸阳消息"
      relationship_to_protagonist: "主角自身"

    - id: meng_tian
      name: "蒙恬"
      identity: "秦大将，北击匈奴，统率三十万边军"
      historical_position: "秦军最高统帅之一，蒙氏家族核心人物"
      core_goals:
        - "保全家族"
        - "保护扶苏"
        - "遵守秦法"
        - "不辜负始皇托付"
      resources:
        - "三十万边军的实际指挥权"
        - "裨将王离（但王离是始皇安排的部将）"
        - "多年边防声望"
        - "弟弟蒙毅在咸阳为官"
      fears:
        - "公开抗旨会害死弟弟蒙毅"
        - "三十万边军中有多少真正忠于自己"
        - "扶苏性格软弱，可能不听劝"
        - "如果诏书是真的，自己已经是不忠之臣"
      personality: "忠勇、谨慎、有主见、重家族、深谋远虑"
      information_available:
        - "诏书内容及使者态度"
        - "边军现状"
        - "咸阳朝中有人敌视蒙氏"
        - "王离可以接手兵权"
        - "不知道始皇已死"
      constraints:
        - "作为秦将，公开抗旨的代价极大"
        - "弟弟蒙毅在咸阳为人质"
        - "王离是裨将，始皇安排的制衡"
        - "边军粮草依赖朝廷供应"
      likely_actions:
        - "劝阻扶苏自杀"
        - "建议派人去咸阳核实"
        - "扣留使者，封锁消息"
        - "如果扶苏坚持自杀，会服从诏书"
      relationship_to_protagonist: "最重要的盟友，但受制于忠君观念和家族安全"

    - id: zhao_gao
      name: "赵高"
      identity: "中车府令兼行符玺令事，胡亥之师"
      historical_position: "宫廷宦官，掌握玺印和文书通道"
      core_goals:
        - "确保胡亥继位"
        - "消灭扶苏和蒙氏兄弟"
        - "独揽大权"
        - "清除所有政敌"
      resources:
        - "掌握皇帝玺印"
        - "控制宫廷文书通道"
        - "胡亥的信任"
        - "李斯的配合（暂时）"
        - "部分宫廷卫戍"
      fears:
        - "扶苏未死并率军南下"
        - "蒙恬察覺詔書偽造"
        - "李斯中途反悔"
        - "始皇其他儿子有所动作"
        - "六国贵族趁乱起事"
      personality: "阴险狡诈、极度精明、精通秦法、权力欲极强、善于操纵人心"
      information_available:
        - "始皇已死"
        - "诏书是伪造的"
        - "胡亥完全听话"
        - "李斯已屈服"
        - "伪造的诏书已发出"
        - "不知道扶苏/李世民穿越"
      constraints:
        - "目前必须依靠李斯的丞相权威"
        - "兵权尚未到手"
        - "消息需要时间传递"
        - "密不发丧有时间限制"
      likely_actions:
        - "加速返回咸阳"
        - "控制蒙毅"
        - "准备宣布始皇死讯和新君继位"
        - "派密探打探上郡情况"
        - "如果听到扶苏未死，会立即采取强硬措施"
      relationship_to_protagonist: "死敌，但此时尚未暴露全部实力"

    - id: li_si
      name: "李斯"
      identity: "秦左丞相，协助秦始皇统一天下的关键谋臣"
      historical_position: "帝国第二号人物，秦制的主要设计者"
      core_goals:
        - "保全自身地位和家族安全"
        - "维持秦朝统治稳定"
        - "证明自己的选择是正确的"
      resources:
        - "丞相职权"
        - "对秦制的精通"
        - "部分朝臣的支持"
        - "政治经验和人脉"
      fears:
        - "赵高最终会除掉自己"
        - "胡亥不堪大任"
        - "扶苏若继位会清算自己"
        - "东方的反叛"
        - "后世名声败坏"
      personality: "极度聪明、现实主义、自私自保、有政治远见但道德底线灵活"
      information_available:
        - "始皇已死"
        - "诏书是伪造的"
        - "赵高在利用自己"
        - "扶苏不死就是一隐患"
        - "自己已经参与了谋反，回头极难"
      constraints:
        - "已经被赵高拉下水，无法回头"
        - "丞相身份意味着责任和罪责"
        - "家族在咸阳"
        - "随时可能被赵高抛弃"
      likely_actions:
        - "配合赵高完成胡亥继位流程"
        - "暗中保留一点退路"
        - "控制帝国行政机器运转"
        - "如果扶苏未死并展示出实力，会重新权衡"
      relationship_to_protagonist: "表面中立，实际已背叛，但背叛程度有弹性"

    - id: hu_hai
      name: "胡亥"
      identity: "秦始皇第十八子，赵高弟子"
      historical_position: "幼子，被赵高操纵的继承人"
      core_goals:
        - "成为皇帝"
        - "享受权力"
        - "依赖赵高"
      resources:
        - "始皇之子的身份"
        - "赵高的辅佐"
        - "李斯的支持（被迫）"
        - "随行巡游的宫廷资源"
      fears:
        - "事情败露"
        - "扶苏活着"
        - "赵高抛弃自己"
        - "始皇其他兄弟不服"
        - "无法控制天下"
      personality: "年轻幼稚、自私、残忍的潜质、依赖性强、缺乏主见"
      information_available:
        - "始皇已死"
        - "诏书是伪造的，自己知道"
        - "赵高在帮自己"
        - "李斯已经答应"
        - "不知道上郡的具体情况"
      constraints:
        - "没有独立政治能力"
        - "完全依赖赵高"
        - "身份未公开，目前还是普通皇子"
        - "一旦继位，就必须面对天下"
      likely_actions:
        - "听从赵高安排"
        - "伪装悲伤和孝道"
        - "期待回咸阳登基"
        - "如果扶苏有动作，会惊慌失措"
      relationship_to_protagonist: "直接的权力竞争者，但主要是傀儡"

    - id: imperial_decree
      name: "始皇遗诏/皇权象征"
      identity: "制度性Agent：秦始皇留下的政治遗产、皇权法统、秦法体系"
      historical_position: "帝国合法性的来源"
      core_goals:
        - "（制度惯性）维持帝国统一"
        - "（法理层面）确保继承人合法"
      resources:
        - "秦始皇的权威（死后仍巨大）"
        - "秦法的威慑力"
        - "官僚体系的惯性"
        - "天下归一的正统观念"
      fears:
        - "帝国分裂"
        - "继承危机"
        - "六国复辟"
        - "秦法被破坏"
      personality: "冷酷、非人格化、刚性的制度力量"
      information_available:
        - "真诏书的内容（扶苏继位，以兵属蒙恬）"
        - "假诏书的内容（扶苏自杀，胡亥继位）"
        - "秦法关于继承和谋反的规定"
      constraints:
        - "皇权一旦被伪造，法理就产生裂痕"
        - "制度依赖人来执行"
        - "秦始皇的权威随死亡开始衰减"
      likely_actions:
        - "真诏书指向扶苏继位"
        - "假诏书指向扶苏死亡"
        - "谁能控制皇权符号（玺、丧礼、咸阳），谁就掌握合法性"
      relationship_to_protagonist: "法理上支持扶苏（真诏），实际上被赵高控制"

    - id: frontier_generals
      name: "王离及上郡边军将领"
      identity: "蒙恬部将，王离（裨将）+ 各级边军军官"
      historical_position: "边军指挥层，秦军骨干"
      core_goals:
        - "服从军令"
        - "维护军队稳定"
        - "保全自身"
        - "维持对匈奴的防线"
      resources:
        - "基层军队的执行力"
        - "王离的特殊身份（王翦之孙）"
        - "边军对蒙恬的忠诚"
      fears:
        - "卷入宫廷斗争"
        - "军队分裂"
        - "匈奴趁机入侵"
        - "被命令做违背原则的事"
      personality: "职业军人、服从命令、对蒙恬忠诚但更忠诚于秦"
      information_available:
        - "诏书内容（公开部分）"
        - "蒙恬的态度"
        - "扶苏的态度"
        - "不知道诏书真假"
      constraints:
        - "必须服从朝廷命令（理论上）"
        - "王离可能被赵高拉拢"
        - "边军不能无粮"
        - "匈奴虎视眈眈"
      likely_actions:
        - "观望"
        - "如果蒙恬抗旨，会面临站队问题"
        - "王离可能接受朝廷密令接管兵权"
      relationship_to_protagonist: "中立，可争取，但王离是赵高的潜在棋子"

    - id: six_states_observer
      name: "六国遗民观察者"
      identity: "原六国贵族、遗民、士人的集体声音（作为非人格化Agent）"
      historical_position: "帝国最不稳定的因素"
      core_goals:
        - "恢复故国"
        - "推翻秦朝暴政"
        - "伺机而动"
      resources:
        - "民间怨气"
        - "地下网络"
        - "部分武力（张良博浪沙刺秦为前例）"
        - "秦国对六国故地控制薄弱"
      fears:
        - "秦朝镇压"
        - "内部出卖"
        - "时机未成熟就暴露"
        - "新君比秦始皇更残暴"
      personality: "隐忍、伺机、暗流涌动"
      information_available:
        - "始皇东巡，可能病重"
        - "咸阳可能出大事（民间传言）"
        - "不清楚具体发生了什么"
        - "知道扶苏是仁义之人"
      constraints:
        - "没有统一指挥"
        - "各怀心思（楚人想复楚，齐人想复齐）"
        - "缺乏军力和组织"
        - "始皇还在世（以为）时不敢动"
      likely_actions:
        - "密切观察"
        - "如果秦廷内乱，会加速准备起事"
        - "如果扶苏继位推行仁政，可能观望"
      relationship_to_protagonist: "潜在的威胁或潜在的拥护者（取决于主角执政方向）"

  # --- 5轮推演设计 ---
  simulation_rounds:
    - round: 1
      title: "意识觉醒"
      trigger: "扶苏接到赐死诏，痛哭欲自杀，蒙恬在侧苦劝。李世民意识在扶苏身体中醒来。"
      key_conflicts:
        - "扶苏（李世民意）的自我认知混乱"
        - "是否自杀的生死抉择"
        - "李世民经验 vs 扶苏情感残留"

    - round: 2
      title: "说服蒙恬"
      trigger: "李世民（以扶苏的身份）决定不自杀，但需要说服蒙恬支持这个决定"
      key_conflicts:
        - "蒙恬的忠君观念 vs 对扶苏的保护欲"
        - "如何在不暴露穿越的情况下说服蒙恬"
        - "蒙恬对诏书的怀疑 vs 对秦法的敬畏"

    - round: 3
      title: "控局与判断"
      trigger: "决定暂缓执行诏书后，开始分析形势、控制信息、判断敌人"
      key_conflicts:
        - "如何封锁上郡消息"
        - "如何判断诏书真假（李世民没有秦史知识）"
        - "如何处理王离（赵高的人）"
        - "如何获取咸阳的真实情报"

    - round: 4
      title: "战略抉择"
      trigger: "确认诏书是假的（逻辑推理而非历史知识），必须决定下一步行动"
      key_conflicts:
        - "北守匈奴 vs 南下咸阳 vs 派使者交涉"
        - "是否公开讨伐赵高"
        - "如何争取李斯"
        - "如何争取天下人心"

    - round: 5
      title: "反制与博弈"
      trigger: "赵高、李斯、胡亥收到扶苏未死的消息，开始反制行动"
      key_conflicts:
        - "赵高的应对策略"
        - "李斯的重新权衡"
        - "胡亥的恐慌与决策"
        - "信息战——真假诏书的舆论争夺"

  # --- 输出文件 ---
  output:
    base_dir: "outputs/qin_fusu_lishimin_run_001"
    files:
      - "scenario.json"
      - "agents.json"
      - "world_state.json"
      - "timeline.json"
      - "plot_outline.md"
      - "chapter_001.md"
      - "consistency_report.md"
